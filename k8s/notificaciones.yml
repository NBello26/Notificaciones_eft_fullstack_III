apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones-deployment
  labels:
    app: ms-notificaciones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-notificaciones
  template:
    metadata:
      labels:
        app: ms-notificaciones
    spec:
      containers:
      - name: ms-notificaciones
        image: 085985863834.dkr.ecr.us-east-1.amazonaws.com/ms-notificaciones:${IMAGE_TAG}
        ports:
        - containerPort: 8086
        env:
        - name: DB_URL
          value: "jdbc:postgresql://sanosdb-service:5432/db_notificaciones"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password
        - name: EUREKA_URL
          value: "http://eureka-service:8761/eureka/"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rabbitmq-username
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rabbitmq-password
---
apiVersion: v1
kind: Service
metadata:
  name: notificaciones-service
spec:
  type: ClusterIP
  selector:
    app: ms-notificaciones
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 8086
